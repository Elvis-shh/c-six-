# docker-compose.yml — SmartReport 全服务编排
# Phase 3: frontend + backend + ai-engine + mysql + redis

services:
  # ============================================================
  # MySQL 数据库
  # ============================================================
  mysql:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    image: smartreport-mysql:local
    container_name: smartreport-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: smartreport
      MYSQL_USER: smartreport
      MYSQL_PASSWORD: smartreport123
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    cpus: 0.50
    mem_limit: 1024m
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/sql:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --default-authentication-plugin=mysql_native_password
      - --innodb-buffer-pool-size=256M
      - --max-connections=80
    networks:
      - smartreport-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis 缓存
  # ============================================================
  redis:
    image: ${REDIS_IMAGE:-m.daocloud.io/docker.io/library/redis:7-alpine}
    container_name: smartreport-redis
    restart: always
    command: redis-server --appendonly yes --save 60 1000
    ports:
      - "${REDIS_PORT:-6379}:6379"
    cpus: 0.15
    mem_limit: 256m
    volumes:
      - redis-data:/data
    networks:
      - smartreport-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Spring Boot 后端
  # ============================================================
  backend:
    build:
      context: ..
      dockerfile: devops/Dockerfile
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-m.daocloud.io/docker.io/library/maven:3.9-eclipse-temurin-17}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-m.daocloud.io/docker.io/library/eclipse-temurin:17-jre}
        MAVEN_MIRROR_URL: ${MAVEN_MIRROR_URL:-https://maven.aliyun.com/repository/public}
    container_name: smartreport-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: smartreport
      MYSQL_PASSWORD: smartreport123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_ENGINE_URL: http://ai-engine:8000
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Shanghai -Dfile.encoding=UTF-8 -Xms256m -Xmx512m -XX:+UseSerialGC"
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 50MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 50MB
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 10
    cpus: 0.60
    mem_limit: 768m
    volumes:
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    networks:
      - smartreport-net

  # ============================================================
  # FastAPI AI 引擎（RAG / LLM / OCR / NER）
  # ============================================================
  ai-engine:
    build:
      context: ..
      dockerfile: devops/AIServer.Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-m.daocloud.io/docker.io/library/python:3.11-slim}
    image: smartreport-ai-engine:local
    container_name: smartreport-ai-engine
    restart: always
    environment:
      TZ: Asia/Shanghai
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
    ports:
      - "8000:8000"
    cpus: 0.30
    mem_limit: 512m
    volumes:
      - ai-reports:/app/data/reports
    networks:
      - smartreport-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Vue 3 前端 (Nginx)
  # ============================================================
  frontend:
    build:
      context: ..
      dockerfile: devops/nginx/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-m.daocloud.io/docker.io/library/node:18-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-m.daocloud.io/docker.io/library/nginx:alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: smartreport-frontend
    restart: always
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:80"
    cpus: 0.15
    mem_limit: 128m
    networks:
      - smartreport-net

networks:
  smartreport-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  logs:
  ai-reports:
